services:
  - type: web
    name: my-netflix
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: netflix-data
      mountPath: /var/data/netflix
      sizeGB: 1
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: DATA_ROOT
        value: /var/data/netflix
